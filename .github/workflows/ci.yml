name: CI
on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          modules: 'qtwebsockets'
          cache: true

      - name: Cache vcpkg tool
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-tool-linux-${{ hashFiles('vcpkg.json') }}

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed/bitatm
          key: vcpkg-linux-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgJsonGlob: 'vcpkg.json'
      
      - name: Disable vcpkg x-gha binary caching
        run: echo "VCPKG_BINARY_SOURCES=clear" >> $GITHUB_ENV

      - name: Create CMakeUserPresets
        run: |
          echo '{"version":3,"configurePresets":[{"name":"default","inherits":"base","cacheVariables":{"VCPKG_INSTALLED_DIR":"${{ github.workspace }}/vcpkg_installed/bitatm"}}]}' > CMakeUserPresets.json

      - name: Configure
        run: cmake --preset=default

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Upload backend binary
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: bitatm-backend
          path: build/backend/bitatm-backend
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Activate MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.0'
          modules: 'qtwebsockets'
          cache: true
      
      - name: Cache vcpkg tool
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg
          key: vcpkg-tool-windows-${{ hashFiles('vcpkg.json') }}

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_installed/bitatm
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Create CMakeUserPresets
        run: |
          $path = "${{ github.workspace }}/vcpkg_installed/bitatm" -replace '\\', '/'
          "{`"version`":3,`"configurePresets`":[{`"name`":`"default`",`"inherits`":`"base`",`"cacheVariables`":{`"VCPKG_INSTALLED_DIR`":`"$path`"}}]}" | Set-Content CMakeUserPresets.json

      - name: Configure
        run: cmake --preset=default

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  deploy:
    runs-on: self-hosted
    needs: [build-linux, build-windows]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: bitatm-backend
          path: /opt/stacks/bitatm/

      - name: Fix permissions
        run: chmod +x /opt/stacks/bitatm/bitatm-backend

      - name: Pull latest code
        run: |
          cd /opt/stacks/bitatm/BitATM
          git pull origin main

      - name: Rebuild and restart stack
        run: |
          cd /opt/stacks/bitatm
          docker compose build backend
          docker compose up -d

      - name: Verify
        run: |
          sleep 3
          docker compose -f /opt/stacks/bitatm/compose.yaml ps backend